services:
  db:
    image: postgis/postgis:18-3.6
    command: postgres
      -c logging_collector=on
      -c log_destination=stderr
      -c log_filename=postgresql.log
      -c ssl=on
      -c ssl_cert_file=/etc/ssl/certs/ssl-cert-snakeoil.pem
      -c ssl_key_file=/etc/ssl/private/ssl-cert-snakeoil.key
    environment:
      # DOCS AT: https://hub.docker.com/_/postgres/
      - POSTGRES_DB=test_template
      - POSTGRES_USER=test
      - POSTGRES_PASSWORD=test
    ports:
      - '5430:5432'
    volumes:
      - ./test/container-db/schema:/docker-entrypoint-initdb.d/:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d test_template"]
      interval: 2s
      timeout: 3s
      retries: 30
  api:
    build:
      context: .
      dockerfile: Dockerfile.ci
      secrets:
        - npm_token
    command: /srv/run.sh
    depends_on:
      db:
        condition: service_healthy
    entrypoint: /srv/wait-db-container.sh db 5432
    environment:
      - API_ENV=test
      - AWS_ACCESS_KEY_ID=${API_DEMO_AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${API_DEMO_AWS_SECRET_ACCESS_KEY}
      - NODE_ENV=production
    ports:
      - '6663:8000'
    tty: true
    volumes:
      - .:/srv/api
      - node-modules:/srv/api/node_modules/
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').createConnection({host:'127.0.0.1', port:8000}).on('connect',()=>process.exit(0)).on('error',()=>process.exit(1));\""]
      interval: 2s
      timeout: 3s
      retries: 30
  test:
    build: ./test/container-test
    command: /run.sh
    depends_on:
      api:
        condition: service_healthy
      db:
        condition: service_healthy
    entrypoint: /wait-api-container.sh api 8000
    environment:
      - PGDATABASE=test
      - PGUSER=test
      - PGPASSWORD=test
      - TEST_CASE
    restart: "no"
    tty: true
    volumes:
      - ./test/container-test:/usr/app
      - test-node-modules:/usr/app/node_modules/

secrets:
  npm_token:
    environment: NPM_TOKEN

volumes:
  node-modules:
  test-node-modules:
