services:
  api:
    build:
      context: .
      args:
        - NPM_TOKEN
      dockerfile: Dockerfile.ci
    command: /run.sh
    depends_on:
      - db
    entrypoint: /wait-db-container.sh db 5432
    environment:
      - NODE_ENV=test
      - AWS_ACCESS_KEY_ID=${API_DEMO_TEST_AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${API_DEMO_TEST_AWS_ACCESS_KEY_ID}
    ports:
      - '6662:8000'
    volumes:
      - .:/var/www/
      - node-modules:/var/www/node_modules/
  test:
    build: container-test
    command: /run.sh
    depends_on:
      - api
      - db                         # so as to drop database and create a new one on every test run
    entrypoint: /wait-api-container.sh api 8000
    environment:
      - PGDATABASE=test
      - PGPORT=5432
      - PGUSER=test
      - PGUSERAPI= # login username for postgres non-superuser with defined permissions to replicate prod
      - PGPASSWORD=test
      - TEST_CASE
    links:
      - db
    volumes:
      - api:/var/www
      - ./container-test:/usr/app
      - ./index-debug.apib:/container_api/manifest.apib
      - ./routes-authenticated.js:/usr/routes-authenticated.js  # used to populate the permissions refresh.
  db:
    command: postgres -c logging_collector=on -c log_destination=stderr -c log_filename=postgresql.log
    environment:
      - POSTGRES_DB=test_template
      - POSTGRES_USER=test        # postgres superuser for all our DDL activities.
      - POSTGRES_PASSWORD=test
    image: ${DB_IMAGE:-empty_for_now}
    ports:
      - '5430:5432'
volumes:
  api:
  node-modules:
