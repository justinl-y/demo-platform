name: Deploy to Elastic Beanstalk

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to AWS Elastic Beanstalk
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate deployment version label
        id: version
        run: echo "label=$(date +'%Y%m%d%H%M%S')-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Zip source bundle
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude "test/*" \
            --exclude "node_modules/*" \
            --exclude ".github/*"

      - name: Upload bundle to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
        run: |
          aws s3 cp deploy.zip s3://${{ vars.EB_S3_BUCKET }}/deploy-${{ steps.version.outputs.label }}.zip

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ vars.EB_APPLICATION_NAME }}
          environment_name: ${{ vars.EB_ENVIRONMENT_NAME }}
          region: ${{ vars.AWS_REGION }}
          version_label: ${{ steps.version.outputs.label }}
          s3_bucket: ${{ vars.EB_S3_BUCKET }}
          s3_key: deploy-${{ steps.version.outputs.label }}.zip
          wait_for_deployment: true
