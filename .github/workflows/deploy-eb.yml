name: Deploy to Elastic Beanstalk

on:
  push:
    branches:
      - master
    paths:
      - 'api-demo/**'
      - 'shared/**'

permissions:
  contents: read

concurrency:
  group: eb-deploy-master
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api-demo
    timeout-minutes: 30
    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Generate deployment version label
      - name: Generate deployment version label
        id: version
        run: echo "label=$(date +'%Y%m%d%H%M%S')-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # Zip source bundle
      - name: Zip source bundle
        run: |
          zip -r deploy.zip . \
            --exclude ".git*" \
            --exclude "test/*" \
            --exclude "node_modules/*" \
            --exclude ".github/*"

      # Inspect ZIP contents (optional)
      - name: Inspect ZIP contents
        run: |
          if unzip -l deploy.zip | grep -Eq '\.ebextensions/|\.platform/'; then
            echo "EB config detected"
          else
            echo "Warning: No EB config found; ensure your platform settings are correct"
          fi

      # Verify ZIP exists
      - name: Verify ZIP location
        run: test -f deploy.zip

      # Deploy to Elastic Beanstalk
      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ vars.EB_APPLICATION_NAME }}
          environment_name: ${{ vars.EB_ENVIRONMENT_NAME }}
          region: ${{ vars.AWS_REGION }}
          version_label: ${{ steps.version.outputs.label }}
          version_description: "Git commit ${{ github.sha }}"
          deployment_package: api-demo/deploy.zip
          wait_for_deployment: true
          wait_for_environment_recovery: 180
