name: PR CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  integration-tests:
    name: Docker CI Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api-demo
    timeout-minutes: 15
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
      COMPOSE_PROJECT_NAME: ci
      COMPOSE_FILE: docker-compose-ci.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Ensure clean compose state
        run: docker compose down -v || true

      - name: Build API and test images
        run: docker compose build api test

      - name: Start DB and API
        run: docker compose up -d --wait db api

      - name: Run integration test container
        run: docker compose up --abort-on-container-exit --exit-code-from test test

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Teardown compose stack
        if: always()
        run: docker compose down -v --remove-orphans
